name: 청약 데이터 자동 갱신

on:
  schedule:
    - cron: "0 21 * * *"   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch: {}      # 수동 실행 버튼
  push:
    branches: [ main ]       # 배포 직후 1회 생성

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: listings.json 생성
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
        run: node tools/fetch-data.js
      - name: 변경분 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add listings.json
          git diff --staged --quiet || git commit -m "chore: 청약 데이터 자동 갱신 ($(date -u +%Y-%m-%d))"
          git push
